<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeTTY 多终端测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00d4ff;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: #00ff88;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .tabs-container {
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
    }

    .tabs-header {
      display: flex;
      background: #0f0f23;
      border-bottom: 1px solid #333;
    }

    .tab-btn {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #888;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: #fff;
      background: #1a1a2e;
    }

    .tab-btn.active {
      color: #00d4ff;
      border-bottom-color: #00d4ff;
      background: #16213e;
    }

    .tab-btn .tab-status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      margin-left: 8px;
    }

    .tab-btn .tab-status.active {
      background: #00ff88;
    }

    .tab-content {
      display: none;
      padding: 15px;
    }

    .tab-content.active {
      display: block;
    }

    .terminal-output {
      background: #000;
      padding: 15px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      color: #00ff88;
      min-height: 350px;
      max-height: 400px;
      overflow: auto;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    .input-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #333;
    }

    .input-section h3 {
      margin-bottom: 10px;
      color: #00d4ff;
      font-size: 14px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-group input {
      flex: 1;
      padding: 10px 12px;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
    }

    .input-group input:focus {
      outline: none;
      border-color: #00d4ff;
    }

    .input-group button {
      padding: 10px 20px;
      background: #00d4ff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .input-group button:hover {
      background: #00a8cc;
    }

    .special-keys {
      margin-top: 10px;
    }

    .key-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .key-btn {
      padding: 6px 10px;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 40px;
    }

    .key-btn:hover {
      background: #16213e;
      border-color: #00d4ff;
    }

    .key-btn:active {
      background: #00d4ff;
      color: #000;
    }

    .key-btn.ctrl-key {
      background: #1a1a2e;
      border-color: #444;
    }

    .key-btn.ctrl-key:hover {
      background: #2a2a4e;
      border-color: #ff6b6b;
    }

    .tab-info {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #888;
    }

    .tab-info span {
      background: #0f0f23;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .log-section {
      margin-top: 20px;
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
    }

    .log-section h3 {
      margin-bottom: 10px;
      color: #00d4ff;
      font-size: 14px;
    }

    .log-content {
      background: #0f0f23;
      padding: 10px;
      border-radius: 4px;
      max-height: 150px;
      overflow: auto;
      font-size: 11px;
    }

    .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid #222;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #666;
      margin-right: 10px;
    }

    .log-tab {
      color: #00d4ff;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeTTY 多终端测试</h1>
    
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">未连接</span>
      </div>
      <div>
        <span>更新时间: <span id="updateTime">-</span></span>
      </div>
    </div>

    <div class="tabs-container">
      <div class="tabs-header" id="tabsHeader">
        <button class="tab-btn active" data-tab="1">Tab 1 <span class="tab-status"></span></button>
        <button class="tab-btn" data-tab="2">Tab 2 <span class="tab-status"></span></button>
        <button class="tab-btn" data-tab="3">Tab 3 <span class="tab-status"></span></button>
      </div>
      
      <div id="tabsContent"></div>
    </div>

    <div class="log-section">
      <h3>操作日志</h3>
      <div class="log-content" id="logContent"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    let currentTab = 1;
    const tabData = {
      1: { text: '', cursor: { x: 0, y: 0 }, size: { cols: 80, rows: 24 } },
      2: { text: '', cursor: { x: 0, y: 0 }, size: { cols: 80, rows: 24 } },
      3: { text: '', cursor: { x: 0, y: 0 }, size: { cols: 80, rows: 24 } }
    };

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const updateTime = document.getElementById('updateTime');
    const logContent = document.getElementById('logContent');
    const tabsHeader = document.getElementById('tabsHeader');
    const tabsContent = document.getElementById('tabsContent');

    function createTabContent(tabId) {
      return `
        <div class="tab-content ${tabId === currentTab ? 'active' : ''}" data-tab="${tabId}">
          <div class="tab-info">
            <span>大小: <span id="termSize${tabId}">-</span></span>
            <span>光标: <span id="cursorPos${tabId}">-</span></span>
          </div>
          <div class="terminal-output" id="terminalText${tabId}">等待连接...</div>
          
          <div class="input-section">
            <h3>发送命令</h3>
            <div class="input-group">
              <input type="text" id="commandInput${tabId}" placeholder="输入命令，按回车发送...">
              <button onclick="sendCommand(${tabId})">发送</button>
            </div>
            
            <h3 style="margin-top: 12px;">特殊按键</h3>
            <div class="special-keys">
              <div class="key-row">
                <button class="key-btn" onclick="sendKey(${tabId}, 'enter')">Enter</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'tab')">Tab</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'escape')">Esc</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'backspace')">Back</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'delete')">Del</button>
              </div>
              <div class="key-row">
                <button class="key-btn" onclick="sendKey(${tabId}, 'arrowup')">↑</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'arrowdown')">↓</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'arrowleft')">←</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'arrowright')">→</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'home')">Home</button>
                <button class="key-btn" onclick="sendKey(${tabId}, 'end')">End</button>
              </div>
              <div class="key-row">
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'c')">Ctrl+C</button>
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'd')">Ctrl+D</button>
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'z')">Ctrl+Z</button>
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'a')">Ctrl+A</button>
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'l')">Ctrl+L</button>
                <button class="key-btn ctrl-key" onclick="sendCtrl(${tabId}, 'u')">Ctrl+U</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function initTabs() {
      let html = '';
      for (let i = 1; i <= 3; i++) {
        html += createTabContent(i);
      }
      tabsContent.innerHTML = html;

      tabsHeader.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tabId = parseInt(btn.dataset.tab);
          switchTab(tabId);
        });
      });

      for (let i = 1; i <= 3; i++) {
        const input = document.getElementById(`commandInput${i}`);
        if (input) {
          input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              sendCommand(i);
            }
          });
        }
      }
    }

    function switchTab(tabId) {
      currentTab = tabId;

      tabsHeader.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.tab) === tabId);
      });

      tabsContent.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', parseInt(content.dataset.tab) === tabId);
      });

      socket.emit('join-tab', tabId);
    }

    function sendCommand(tabId) {
      const input = document.getElementById(`commandInput${tabId}`);
      const text = input.value.trim();
      if (text) {
        socket.emit('send-input', { tabId, text: text + '\n' });
        addLog(tabId, `发送命令: ${text}`);
        input.value = '';
      }
    }

    function sendKey(tabId, key) {
      socket.emit('send-key', { tabId, key });
      addLog(tabId, `发送按键: ${key}`);
    }

    function sendCtrl(tabId, char) {
      socket.emit('send-ctrl', { tabId, char });
      addLog(tabId, `发送组合键: Ctrl+${char.toUpperCase()}`);
    }

    function addLog(tabId, message) {
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-tab">[Tab ${tabId}]</span>${message}`;
      logContent.insertBefore(entry, logContent.firstChild);
      
      while (logContent.children.length > 100) {
        logContent.removeChild(logContent.lastChild);
      }
    }

    function updateTabContent(tabId, data) {
      tabData[tabId] = {
        text: data.text || '',
        cursor: data.cursor || { x: 0, y: 0 },
        size: data.size || { cols: 80, rows: 24 }
      };

      const terminalText = document.getElementById(`terminalText${tabId}`);
      const termSize = document.getElementById(`termSize${tabId}`);
      const cursorPos = document.getElementById(`cursorPos${tabId}`);

      if (terminalText) terminalText.textContent = data.text || '(空)';
      if (termSize) termSize.textContent = `${data.size?.cols || 80} x ${data.size?.rows || 24}`;
      if (cursorPos) cursorPos.textContent = `${data.cursor?.x || 0}, ${data.cursor?.y || 0}`;

      const tabStatus = tabsHeader.querySelector(`.tab-btn[data-tab="${tabId}"] .tab-status`);
      if (tabStatus) tabStatus.classList.add('active');

      updateTime.textContent = new Date().toLocaleTimeString();
    }

    socket.on('connect', () => {
      statusDot.classList.add('connected');
      statusText.textContent = '已连接';
      addLog(0, '已连接到服务器');

      for (let i = 1; i <= 3; i++) {
        socket.emit('join-tab', i);
      }
    });

    socket.on('disconnect', () => {
      statusDot.classList.remove('connected');
      statusText.textContent = '已断开';
      addLog(0, '与服务器断开连接');
    });

    socket.on('tabs-info', (tabs) => {
      addLog(0, `可用终端: ${tabs.join(', ')}`);
    });

    socket.on('terminal-content', (data) => {
      updateTabContent(data.tabId, data);
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key.length === 1) {
        e.preventDefault();
        sendCtrl(currentTab, e.key);
      }
    });

    initTabs();
    addLog(0, '页面加载完成，等待连接...');
  </script>
</body>
</html>
